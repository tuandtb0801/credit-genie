version: "2.1"
effective_date: "2026-07-01"
status: active
approved_by: "risk-lead@credit-genie"
change_reason: "Initial hackathon baseline policy."

segments:
  personal_loan:
    mode: full
    time_budget_ms: 60000
    scoring:
      weights: { eligibility: 0.25, affordability: 0.40, risk: 0.35 }
      thresholds: { approve: 0.70, decline: 0.35 }
    features:
      llm_reasoning: true
      agent_collaboration: true
      multi_pass_evidence: true
    eligibility:
      min_score_band: fair
      min_credit_history_months: 6
    affordability:
      dti_decline_ceiling: 0.40
    risk:
      max_bnpl_stacking: 3
      max_utilization: 0.80

  bnpl:
    mode: fast
    time_budget_ms: 2000
    scoring:
      weights: { eligibility: 0.30, affordability: 0.35, risk: 0.35 }
      thresholds: { approve: 0.75, decline: 0.40 }
    features:
      llm_reasoning: false
      agent_collaboration: false
      multi_pass_evidence: false
    eligibility:
      min_score_band: fair
      min_credit_history_months: 6
    affordability:
      dti_decline_ceiling: 0.35
    risk:
      max_bnpl_stacking: 3
      max_utilization: 0.80

# Same hard rules apply to both segments unless narrowed by applies_to.
hard_rules:
  - id: HR-001
    condition: "max_dpd >= 90"
    action: DECLINE
    reason_code: SEVERE_DELINQUENCY
    applies_to: [personal_loan, bnpl]

  - id: HR-002
    condition: "dti_ratio > affordability.dti_decline_ceiling"
    action: DECLINE
    reason_code: UNAFFORDABLE
    applies_to: [personal_loan, bnpl]

  - id: HR-003
    condition: "credit_history_months < eligibility.min_credit_history_months"
    action: REFER
    reason_code: THIN_FILE
    applies_to: [personal_loan, bnpl]

  - id: HR-004
    condition: "bnpl_active_count > risk.max_bnpl_stacking or utilization_ratio > risk.max_utilization"
    action: DECLINE
    reason_code: OVER_EXPOSED
    applies_to: [bnpl]

score_bands:
  order: [poor, fair, good, excellent]

consensus:
  max_score_gap: 0.4
  min_confidence: 0.6
